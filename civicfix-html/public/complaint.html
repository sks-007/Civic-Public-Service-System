<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Complaint - CPSS</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen">
  <div id="navbar"></div>

  <main class="flex-1" style="background: linear-gradient(to bottom, var(--secondary), var(--background)); padding: 3rem 1rem;">
    <div class="container" style="max-width: 48rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="text-3xl font-bold mb-2">Submit a Complaint</h1>
        <p class="text-muted-foreground">Help us serve you better by reporting civic issues</p>
      </div>

      <div class="card">
        <div class="card-content">
          <form id="complaintForm">
            <div class="form-group">
              <label class="form-label" for="fullname">Full Name *</label>
              <input type="text" id="fullname" name="fullname" class="form-input" required placeholder="Enter your full name">
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label" for="email">Email Address *</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com">
              </div>

              <div class="form-group">
                <label class="form-label" for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" class="form-input" required placeholder="+1 234 567 8900">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label" for="ward">Ward *</label>
                <select id="ward" name="ward" class="form-select" required>
                  <option value="">Select your ward</option>
                  <option value="Ward 1">Ward 1</option>
                  <option value="Ward 2">Ward 2</option>
                  <option value="Ward 3">Ward 3</option>
                  <option value="Ward 4">Ward 4</option>
                  <option value="Ward 5">Ward 5</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="category">Category *</label>
                <select id="category" name="category" class="form-select" required>
                  <option value="">Loading categories...</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Location Address *</label>
              <input type="text" id="address" name="address" class="form-input" required placeholder="Street address, landmarks, etc.">
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description *</label>
              <textarea id="description" name="description" class="form-textarea" rows="4" required placeholder="Describe the issue in detail..."></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="image">Upload Image (Optional)</label>
              <div class="upload-area" onclick="document.getElementById('image').click()">
                <i data-lucide="upload" style="width: 2rem; height: 2rem; color: var(--primary);"></i>
                <p class="text-sm font-medium">Click to upload image</p>
                <p class="text-xs text-muted-foreground">PNG, JPG up to 5MB</p>
              </div>
              <input type="file" id="image" name="image" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            </div>

            <div id="imagePreview" style="display: none; margin-bottom: 1rem;">
              <img id="previewImage" style="max-width: 100%; height: auto; border-radius: var(--radius); margin-bottom: 0.5rem;">
              <button type="button" class="btn btn-sm btn-outline" onclick="removeImage()">
                <i data-lucide="x" class="icon-sm"></i>
                Remove Image
              </button>
            </div>

            <div id="verificationResult" style="display: none;">
              <div class="verification-card">
                <div class="verification-header" style="background-color: var(--secondary);">
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="shield" class="icon"></i>
                    <span class="font-semibold">AI Verification</span>
                  </div>
                  <span id="verificationStatus" class="badge"></span>
                </div>
                <div class="verification-body">
                  <p class="text-sm mb-3" id="verificationMessage"></p>
                  <div class="verification-checks">
                    <div class="verification-check" style="background-color: var(--background);">
                      <i data-lucide="check-circle" class="icon-sm" style="color: var(--success);"></i>
                      <span id="check1">Analyzing...</span>
                    </div>
                    <div class="verification-check" style="background-color: var(--background);">
                      <i data-lucide="check-circle" class="icon-sm" style="color: var(--success);"></i>
                      <span id="check2">Analyzing...</span>
                    </div>
                    <div class="verification-check" style="background-color: var(--background);">
                      <i data-lucide="check-circle" class="icon-sm" style="color: var(--success);"></i>
                      <span id="check3">Analyzing...</span>
                    </div>
                    <div class="verification-check" style="background-color: var(--background);">
                      <i data-lucide="check-circle" class="icon-sm" style="color: var(--success);"></i>
                      <span id="check4">Analyzing...</span>
                    </div>
                  </div>
                  <div style="margin-top: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
                      <span class="text-xs font-medium">Confidence Score</span>
                      <span class="text-xs font-bold" id="confidenceScore">0%</span>
                    </div>
                    <div class="progress-container">
                      <div class="progress-bar" id="confidenceBar" style="width: 0%;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div id="alertBox" style="display: none; margin-bottom: 1rem;"></div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="submitBtn">
              <i data-lucide="send" class="icon"></i>
              Submit Complaint
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="/js/utils.js"></script>
  <script>
    let uploadedImage = null;
    let verificationPassed = false;

    // Load categories from API
    async function loadCategories() {
      try {
        const response = await fetch('/api/categories');
        const data = await response.json();

        const categorySelect = document.getElementById('category');
        categorySelect.innerHTML = '<option value="">Select a category</option>';

        if (data.success && data.data) {
          data.data.forEach(category => {
            const option = document.createElement('option');
            option.value = category.name;
            option.textContent = category.name;
            categorySelect.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading categories:', error);
        document.getElementById('category').innerHTML = '<option value="">Error loading categories</option>';
      }
    }

    // Handle image upload
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      uploadedImage = file;
      const reader = new FileReader();

      reader.onload = function(e) {
        document.getElementById('previewImage').src = e.target.result;
        document.getElementById('imagePreview').style.display = 'block';

        // Start AI verification
        verifyImage();
      };

      reader.readAsDataURL(file);
    }

    // Remove image
    function removeImage() {
      uploadedImage = null;
      document.getElementById('image').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('verificationResult').style.display = 'none';
      verificationPassed = false;
    }

    // AI Verification (simulated)
    function verifyImage() {
      const verificationDiv = document.getElementById('verificationResult');
      verificationDiv.style.display = 'block';

      const statusBadge = document.getElementById('verificationStatus');
      statusBadge.textContent = 'Analyzing...';
      statusBadge.className = 'badge badge-warning';

      document.getElementById('verificationMessage').textContent = 'Running AI analysis...';
      document.getElementById('check1').textContent = 'Checking metadata...';
      document.getElementById('check2').textContent = 'Analyzing pixels...';
      document.getElementById('check3').textContent = 'Detecting artifacts...';
      document.getElementById('check4').textContent = 'Verifying authenticity...';

      // Simulate 3-second analysis
      setTimeout(() => {
        const isGenuine = Math.random() > 0.3; // 70% chance genuine
        const confidence = isGenuine ? Math.floor(Math.random() * 15 + 85) : Math.floor(Math.random() * 30 + 40);

        statusBadge.textContent = isGenuine ? 'Genuine' : 'Suspicious';
        statusBadge.className = isGenuine ? 'badge badge-success' : 'badge badge-destructive';

        document.getElementById('verificationMessage').textContent = isGenuine
          ? 'Image appears authentic and has not been manipulated.'
          : 'Warning: Image shows signs of manipulation or deepfake generation.';

        document.getElementById('check1').textContent = 'Metadata intact';
        document.getElementById('check2').textContent = isGenuine ? 'No anomalies' : 'Suspicious patterns';
        document.getElementById('check3').textContent = isGenuine ? 'Clean analysis' : 'Artifacts detected';
        document.getElementById('check4').textContent = isGenuine ? 'Verified authentic' : 'Failed verification';

        document.getElementById('confidenceScore').textContent = confidence + '%';
        document.getElementById('confidenceBar').style.width = confidence + '%';
        document.getElementById('confidenceBar').style.backgroundColor = isGenuine ? 'var(--success)' : 'var(--destructive)';

        verificationPassed = isGenuine;
        lucide.createIcons();
      }, 3000);
    }

    // Handle form submission
    document.getElementById('complaintForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (uploadedImage && !verificationPassed) {
        showAlert('Image verification failed. Please upload a different image or submit without an image.', 'error');
        return;
      }

      const formData = {
        fullname: document.getElementById('fullname').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        ward: document.getElementById('ward').value,
        category: document.getElementById('category').value,
        address: document.getElementById('address').value,
        description: document.getElementById('description').value
      };

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="icon spinner"></i> Submitting...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/complaints', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
          showAlert('Complaint submitted successfully! Tracking ID: ' + (data.data.id || 'Generated'), 'success');
          document.getElementById('complaintForm').reset();
          removeImage();

          setTimeout(() => {
            window.location.href = '/track';
          }, 2000);
        } else {
          throw new Error(data.error || 'Submission failed');
        }
      } catch (error) {
        console.error('Error:', error);
        showAlert('Error submitting complaint. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i data-lucide="send" class="icon"></i> Submit Complaint';
        lucide.createIcons();
      }
    });

    // Show alert
    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = type === 'success' ? 'alert alert-success' : 'alert alert-error';
      alertBox.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="icon"></i>
        <span>${message}</span>
      `;
      alertBox.style.display = 'flex';
      lucide.createIcons();

      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }

    // Initialize
    loadCategories();
  </script>
</body>
</html>
