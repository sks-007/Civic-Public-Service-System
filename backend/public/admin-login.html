<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CPSS</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: linear-gradient(to bottom right, var(--primary), var(--primary-dark)); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;">
  <div style="width: 100%; max-width: 28rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="width: 4rem; height: 4rem; border-radius: 1rem; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
        <i data-lucide="shield" style="width: 2rem; height: 2rem; color: white;"></i>
      </div>
      <h1 class="text-2xl font-bold" style="color: white; margin-bottom: 0.5rem;">Admin Portal</h1>
      <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.875rem;">Civic Public Service System</p>
    </div>

    <div class="card">
      <div class="card-content">
        <form id="adminLoginForm">
          <div class="form-group">
            <label class="form-label" for="email">Admin Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              required
              placeholder="admin@cpss.gov"
              value="admin@cpss.gov"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              required
              placeholder="Enter admin password"
              value="admin123"
            >
          </div>

          <div style="padding: 0.75rem; background-color: rgba(26, 86, 219, 0.1); border-radius: var(--radius); margin-bottom: 1rem;">
            <p class="text-xs text-muted-foreground" style="text-align: center;">
              <i data-lucide="info" class="icon-sm" style="display: inline; vertical-align: middle;"></i>
              Demo Credentials: admin@cpss.gov / admin123
            </p>
          </div>

          <div id="alertBox" style="display: none; margin-bottom: 1rem;"></div>

          <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="submitBtn">
            <i data-lucide="shield-check" class="icon"></i>
            Sign In as Admin
          </button>
        </form>
      </div>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="/" class="text-sm" style="color: rgba(255, 255, 255, 0.8); text-decoration: none;">
        <i data-lucide="arrow-left" class="icon-sm" style="display: inline; vertical-align: middle;"></i>
        Back to Home
      </a>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simple demo authentication
      if (email === 'admin@cpss.gov' && password === 'admin123') {
        // Store admin session
        localStorage.setItem('cpss-admin-auth', 'true');
        localStorage.setItem('cpss-admin-email', email);

        showAlert('Login successful! Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = '/admin';
        }, 1500);
      } else {
        showAlert('Invalid admin credentials. Please try again.', 'error');
      }
    });

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = type === 'success' ? 'alert alert-success' : 'alert alert-error';
      alertBox.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="icon"></i>
        <span>${message}</span>
      `;
      alertBox.style.display = 'flex';
      lucide.createIcons();
    }

    lucide.createIcons();
  </script>
</body>
</html>
